# ===================================================================
# Spring Boot configuration for the "dev" profile.
# Sensitive values are loaded from the .vscode/.env file.
# ===================================================================

logging:
  level:
    ROOT: INFO
    '[com.tulip.host]': INFO
    '[javax.management.remote.rmi]': WARN
    '[org.springframework.web.filter.CommonsRequestLoggingFilter]': INFO

spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      poolName: Hikari
      auto-commit: false
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  liquibase:
    contexts: dev, faker
  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false

server:
  port: 8081
  forward-headers-strategy: native

jhipster:
  cors:
    allowed-origins: 'http://localhost:5173, http://localhost:5173/, http://192.168.0.111:5173, http://192.168.0.111:5173/'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        base64-secret: ${JWT_SECRET}
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  logging:
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

application:
  aws:
    region:
      value: ${S3_REGION:ap-northeast-1}
    credential:
      accessKey: ${S3_KEY}
      secret: ${S3_SECRET}
      bucket-name: ${S3_BUCKET}
      invoice-bucket-name: ${S3_INVOICE_BUCKET}
  twilio_config:
    communication_enabled: true
